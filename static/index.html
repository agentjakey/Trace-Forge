<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TraceForge</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'SF Mono','Fira Code',monospace;font-size:13px;background:#0d1117;color:#c9d1d9;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* header */
.hdr{background:#161b22;border-bottom:1px solid #30363d;padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.hdr-logo{font-size:15px;font-weight:700;color:#f0f6fc;letter-spacing:-0.5px}
.hdr-logo span{color:#1f6feb}
.hdr-sub{color:#8b949e;font-size:11px}

/* layout */
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:256px;background:#161b22;border-right:1px solid #30363d;display:flex;flex-direction:column;flex-shrink:0}
.sb-hdr{padding:10px 14px;border-bottom:1px solid #30363d;display:flex;justify-content:space-between;align-items:center}
.sb-hdr-label{color:#8b949e;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.sb-hdr button{font-size:10px;padding:2px 7px;background:#21262d;border:1px solid #30363d;color:#c9d1d9;border-radius:4px;cursor:pointer}
#run-list{flex:1;overflow-y:auto}

/* run items */
.run-item{padding:9px 14px;border-bottom:1px solid #21262d;cursor:pointer;transition:background .1s}
.run-item:hover{background:#1c2128}
.run-item.active{background:#1a2636;border-left:2px solid #1f6feb;padding-left:12px}
.ri-name{color:#f0f6fc;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.ri-meta{display:flex;gap:6px;color:#8b949e;font-size:10px;flex-wrap:wrap;align-items:center}

/* status badges */
.badge{padding:1px 5px;border-radius:8px;font-size:9px;font-weight:700;text-transform:uppercase}
.badge-running{background:#1f3a5f;color:#79c0ff}
.badge-success{background:#1a3a2e;color:#56d364}
.badge-error{background:#3d1e1e;color:#f85149}

/* main area */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tabs{display:flex;background:#161b22;border-bottom:1px solid #30363d;padding:0 14px;flex-shrink:0}
.tab{padding:9px 13px;background:none;border:none;color:#8b949e;cursor:pointer;font-family:inherit;font-size:12px;border-bottom:2px solid transparent;transition:color .1s}
.tab:hover{color:#c9d1d9}
.tab.on{color:#f0f6fc;border-bottom-color:#1f6feb}
#content{flex:1;overflow-y:auto;padding:16px}

/* run header */
.rh{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #30363d;flex-wrap:wrap}
.rh h2{font-size:14px;color:#f0f6fc}
.rh-stats{display:flex;gap:10px;color:#8b949e;font-size:11px;align-items:center;flex-wrap:wrap}
.rh-actions{margin-left:auto;display:flex;gap:6px}
.btn{padding:4px 11px;background:#21262d;border:1px solid #30363d;color:#c9d1d9;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit}
.btn:hover{background:#30363d}
.btn-primary{background:#1f6feb;border-color:#1f6feb;color:#fff}
.btn-primary:hover{background:#2d79f3}

/* waterfall */
.wf{font-size:12px}
.wf-hdr{display:grid;grid-template-columns:220px 1fr 150px;gap:8px;padding:5px 8px;color:#8b949e;font-size:10px;border-bottom:1px solid #30363d;position:relative}
.wf-col-bar{position:relative;height:16px}
.tm{position:absolute;font-size:9px;color:#484f58;transform:translateX(-50%);top:0;white-space:nowrap}
.wf-row{display:grid;grid-template-columns:220px 1fr 150px;gap:8px;padding:4px 8px;border-bottom:1px solid #1c2128;cursor:pointer;align-items:center;min-height:28px}
.wf-row:hover{background:#1c2128}
.wf-row.err{background:rgba(248,81,73,.04)}
.wf-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:3px}
.wf-connector{color:#30363d;font-size:10px;flex-shrink:0}
.wf-tag{color:#8b949e;font-size:9px;background:#1c2128;padding:1px 4px;border-radius:3px;margin-left:3px;flex-shrink:0}
.wf-bc{position:relative;height:16px;background:#1c2128;border-radius:2px;overflow:hidden}
.wf-bar{position:absolute;height:100%;background:#1f6feb;border-radius:2px;min-width:2px;opacity:.85}
.wf-bar.err{background:#da3633}
.wf-stats{display:flex;gap:7px;color:#8b949e;font-size:10px;justify-content:flex-end;align-items:center}
.ebadge{background:#da3633;color:#fff;padding:1px 4px;border-radius:3px;font-size:9px;font-weight:700}

/* token breakdown */
.tb{max-width:760px}
.tb-legend{display:flex;gap:14px;margin-bottom:10px;font-size:10px;color:#8b949e}
.tb-legend span::before{content:'';display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:4px;vertical-align:middle}
.li::before{background:#1f6feb}
.lo::before{background:#56d364}
.tb-row{display:grid;grid-template-columns:200px 1fr 190px;gap:10px;padding:5px 0;border-bottom:1px solid #1c2128;align-items:center;cursor:pointer}
.tb-row:hover{background:#1c2128}
.tb-bw{height:11px;background:#1c2128;border-radius:2px;overflow:hidden}
.tb-bar{height:100%;background:#56d364;position:relative}
.tb-bar-in{position:absolute;left:0;top:0;height:100%;background:#1f6feb}
.tb-nums{display:flex;gap:7px;font-size:10px;justify-content:flex-end}
.tb-nums .ti{color:#79c0ff}
.tb-nums .to{color:#56d364}
.tb-nums .tc{color:#8b949e}
.tb-total{padding:8px 0;color:#c9d1d9;border-top:1px solid #30363d;margin-top:4px;font-size:11px}

/* step detail */
.sd h3{font-size:13px;color:#f0f6fc;margin-bottom:10px}
.sd h4{font-size:11px;color:#8b949e;margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px}
.meta-cell{background:#1c2128;padding:7px 10px;border-radius:4px}
.meta-cell label{display:block;color:#8b949e;font-size:9px;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
.err-box{background:rgba(248,81,73,.1);border:1px solid #da3633;padding:8px 12px;border-radius:4px;color:#ffa198;margin-bottom:10px;font-size:11px;word-break:break-all}
.io-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.io-panel{background:#1c2128;border:1px solid #30363d;border-radius:4px;padding:10px}
.io-panel pre{overflow:auto;font-size:10px;line-height:1.5;white-space:pre-wrap;word-break:break-all;max-height:280px;color:#c9d1d9}
.replay-box{background:#1c2128;border:1px solid #30363d;border-radius:4px;padding:10px}
.replay-pre{font-size:10px;background:#0d1117;padding:8px;border-radius:4px;overflow:auto;white-space:pre-wrap;max-height:180px;margin:7px 0;color:#c9d1d9}

/* compare */
.cmp-setup p{color:#8b949e;margin:6px 0 10px;font-size:12px}
.cmp-list{display:flex;flex-direction:column;gap:4px;max-height:400px;overflow-y:auto}
.cmp-item{padding:7px 10px;background:#1c2128;border:1px solid #30363d;border-radius:4px;cursor:pointer;font-size:12px}
.cmp-item:hover{background:#21262d}
.cmp-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:12px}
.cmp-hdr .vs{color:#8b949e}
.cmp-tbl{width:100%;border-collapse:collapse;font-size:11px}
.cmp-tbl th{background:#1c2128;padding:5px 9px;text-align:left;color:#8b949e;font-weight:normal;border-bottom:1px solid #30363d}
.cmp-tbl td{padding:5px 9px;border-bottom:1px solid #1c2128}
.cmp-tbl tr.added td{background:rgba(86,211,100,.04)}
.cmp-tbl tr.removed td{background:rgba(248,81,73,.04)}
.better{color:#56d364}
.worse{color:#f85149}

/* misc */
.empty{color:#8b949e;padding:32px;text-align:center;font-size:12px}
.empty-main{color:#8b949e;padding:80px 32px;text-align:center;font-size:13px}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-logo">Trace<span>Forge</span></div>
  <span class="hdr-sub">LLM Pipeline Observability</span>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="sb-hdr">
      <span class="sb-hdr-label">Runs</span>
      <button onclick="loadRuns()">Refresh</button>
    </div>
    <div id="run-list"><div class="empty">Loading...</div></div>
  </div>
  <div class="main">
    <div class="tabs">
      <button class="tab on" data-v="waterfall" onclick="setView('waterfall')">Waterfall</button>
      <button class="tab" data-v="tokens" onclick="setView('tokens')">Tokens</button>
      <button class="tab" data-v="step" onclick="setView('step')">Step Detail</button>
      <button class="tab" data-v="compare" onclick="openCompare()">Compare</button>
    </div>
    <div id="content"><div class="empty-main">Select a run from the sidebar</div></div>
  </div>
</div>
<script src="/static/app.js"></script>
</body>
</html>
